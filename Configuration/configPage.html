<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Open with player - Configuration</title>
    <style>
        .tblPlayers {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
        }
        .tblPlayers th,
        .tblPlayers td {
            padding: 0.75em;
            text-align: left;
            border-bottom: 1px solid var(--theme-border-color, #444);
        }
        .tblPlayers th {
            font-weight: 600;
            color: var(--theme-text-color-secondary, #999);
        }
        .tblPlayers input[type="text"],
        .tblPlayers textarea {
            width: 100%;
            box-sizing: border-box;
            background: var(--theme-background-color-secondary, #2a2a2a);
            border: 1px solid var(--theme-border-color, #444);
            color: var(--theme-text-color, #fff);
            padding: 0.5em;
            border-radius: 4px;
        }
        .tblPlayers textarea {
            min-height: 60px;
            resize: vertical;
        }
        .tblPlayers input[type="checkbox"] {
            cursor: pointer;
        }
        .tblPlayers .actions {
            white-space: nowrap;
        }
        .tblPlayers .actions button {
            margin-right: 0.5em;
        }
        .tblPlayers tr.editing {
            background: var(--theme-background-color-secondary, #2a2a2a);
        }
        .fieldHint {
            font-size: 0.85em;
            color: var(--theme-text-color-secondary, #999);
            margin-top: 0.25em;
        }
    </style>
</head>
<body>
    <div data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <h1>Open with player - Configuration</h1>
                <p>Configure external players for opening media via deep links.</p>

                <div class="verticalSection">
                    <h2>Configured Players</h2>
                    <table class="tblPlayers">
                        <thead>
                            <tr>
                                <th style="width: 20%;">Name</th>
                                <th style="width: 15%;">Prefix</th>
                                <th style="width: 35%;">URL Template</th>
                                <th style="width: 10%;">Enabled</th>
                                <th style="width: 20%;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="playerList">
                        </tbody>
                    </table>
                    <button is="emby-button" type="button" class="raised button-submit" id="addPlayerBtn">
                        <span>Add Player</span>
                    </button>
                </div>

                <div class="verticalSection">
                    <button is="emby-button" type="button" class="raised button-submit block" id="saveBtn">
                        <span>Save Configuration</span>
                    </button>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            (function() {
                const pluginId = 'a7d3a7e9-4b3c-4f1e-9d7a-6c5b4a3d2e1f';
                let config = null;

                // Escape HTML to prevent XSS
                function escapeHtml(text) {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                // Load configuration
                function loadConfig() {
                    return ApiClient.getPluginConfiguration(pluginId).then(function(cfg) {
                        config = cfg;
                        if (!config.Players) {
                            config.Players = [];
                        }
                        renderPlayerList();
                    }).catch(function(error) {
                        console.error('[OpenWith] Failed to load configuration:', error);
                        Dashboard.alert('Failed to load configuration. Please refresh the page.');
                    });
                }

                // Render player list
                function renderPlayerList() {
                    const tbody = document.getElementById('playerList');
                    tbody.innerHTML = '';

                    if (config.Players.length === 0) {
                        const row = tbody.insertRow();
                        const cell = row.insertCell();
                        cell.colSpan = 5;
                        cell.innerHTML = '<em>No players configured yet. Click "Add Player" to get started.</em>';
                        cell.style.textAlign = 'center';
                        cell.style.padding = '2em';
                        return;
                    }

                    config.Players.forEach(function(player, index) {
                        const row = tbody.insertRow();
                        row.dataset.index = index;

                        // Name
                        const nameCell = row.insertCell();
                        nameCell.textContent = player.Name || player.Prefix.replace('://', '');

                        // Prefix
                        const prefixCell = row.insertCell();
                        prefixCell.textContent = player.Prefix;

                        // URL Template
                        const templateCell = row.insertCell();
                        templateCell.innerHTML = player.UrlTemplate ? '<code>' + escapeHtml(player.UrlTemplate) + '</code>' : '<em>Default</em>';

                        // Enabled
                        const enabledCell = row.insertCell();
                        enabledCell.textContent = player.Enabled !== false ? '✓' : '✗';
                        enabledCell.style.textAlign = 'center';

                        // Actions
                        const actionsCell = row.insertCell();
                        actionsCell.className = 'actions';
                        actionsCell.innerHTML =
                            '<button is="emby-button" type="button" class="raised button-edit" onclick="editPlayer(' + index + ')">Edit</button>' +
                            '<button is="emby-button" type="button" class="raised button-delete" onclick="deletePlayer(' + index + ')">Delete</button>';
                    });
                }

                // Add player
                window.addPlayer = function() {
                    const tbody = document.getElementById('playerList');

                    // Remove empty message if exists
                    if (tbody.rows.length === 1 && tbody.rows[0].cells[0].colSpan === 5) {
                        tbody.innerHTML = '';
                    }

                    const row = tbody.insertRow(0);
                    row.className = 'editing';
                    row.dataset.index = '-1'; // New player

                    createEditRow(row, null);
                };

                // Edit player
                window.editPlayer = function(index) {
                    const row = document.querySelector('tr[data-index="' + index + '"]');
                    const player = config.Players[index];

                    row.className = 'editing';
                    createEditRow(row, player);
                };

                // Create edit row
                function createEditRow(row, player) {
                    const index = row.dataset.index;
                    row.innerHTML = '';

                    // Name
                    const nameCell = row.insertCell();
                    nameCell.innerHTML = '<input type="text" id="name-' + index + '" placeholder="Optional" value="' + escapeHtml(player?.Name || '') + '">' +
                        '<div class="fieldHint">Display name</div>';

                    // Prefix
                    const prefixCell = row.insertCell();
                    prefixCell.innerHTML = '<input type="text" id="prefix-' + index + '" placeholder="iina://" required value="' + escapeHtml(player?.Prefix || '') + '">' +
                        '<div class="fieldHint">Must end with ://</div>';

                    // URL Template
                    const templateCell = row.insertCell();
                    templateCell.innerHTML = '<textarea id="template-' + index + '" placeholder="{prefix}weblink?url={streamUrl}">' + escapeHtml(player?.UrlTemplate || '') + '</textarea>' +
                        '<div class="fieldHint">{prefix}, {streamUrl}, {itemId}, {itemName}</div>';

                    // Enabled
                    const enabledCell = row.insertCell();
                    enabledCell.innerHTML = '<input type="checkbox" id="enabled-' + index + '" ' + (player?.Enabled !== false ? 'checked' : '') + '>';
                    enabledCell.style.textAlign = 'center';

                    // Actions
                    const actionsCell = row.insertCell();
                    actionsCell.className = 'actions';
                    actionsCell.innerHTML =
                        '<button is="emby-button" type="button" class="raised button-submit" onclick="savePlayer(' + index + ')">Save</button>' +
                        '<button is="emby-button" type="button" class="raised button-cancel" onclick="cancelEdit(' + index + ')">Cancel</button>';
                }

                // Save player
                window.savePlayer = function(index) {
                    const prefix = document.getElementById('prefix-' + index).value.trim();
                    const name = document.getElementById('name-' + index).value.trim();
                    const urlTemplate = document.getElementById('template-' + index).value.trim();
                    const enabled = document.getElementById('enabled-' + index).checked;

                    // Validation
                    if (!prefix) {
                        alert('Prefix is required.');
                        return;
                    }
                    if (!prefix.endsWith('://')) {
                        alert('Prefix must end with "://"');
                        return;
                    }
                    if (urlTemplate && !urlTemplate.includes('{streamUrl}')) {
                        alert('URL template must contain {streamUrl} variable.');
                        return;
                    }

                    const player = {
                        Id: config.Players[index]?.Id || 'player-' + Date.now(),
                        Prefix: prefix,
                        Name: name || null,
                        UrlTemplate: urlTemplate || null,
                        Enabled: enabled
                    };

                    if (index === '-1') {
                        // New player
                        config.Players.unshift(player);
                    } else {
                        // Edit existing
                        config.Players[index] = player;
                    }

                    renderPlayerList();
                };

                // Cancel edit
                window.cancelEdit = function(index) {
                    if (index === '-1') {
                        // Remove new row
                        renderPlayerList();
                    } else {
                        // Restore view
                        renderPlayerList();
                    }
                };

                // Delete player
                window.deletePlayer = function(index) {
                    if (!confirm('Remove this player?')) {
                        return;
                    }
                    config.Players.splice(index, 1);
                    renderPlayerList();
                };

                // Save configuration
                document.getElementById('saveBtn').addEventListener('click', function() {
                    Dashboard.showLoadingMsg();
                    ApiClient.updatePluginConfiguration(pluginId, config).then(function() {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert('Configuration saved successfully.');
                    }).catch(function(error) {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert('Error saving configuration: ' + error);
                    });
                });

                // Add player button
                document.getElementById('addPlayerBtn').addEventListener('click', addPlayer);

                // Initialize
                loadConfig();
            })();
        </script>
    </div>
</body>
</html>
